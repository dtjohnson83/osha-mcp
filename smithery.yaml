name: OSHA Compliance MCP
description: Query OSHA safety standards (29 CFR 1910 & 1926) with plain-English summaries. Covers fall protection, PPE requirements, penalty info, and more.
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      SUPABASE_URL:
        type: string
        description: "Supabase project URL"
      SUPABASE_ANON_KEY:
        type: string
        description: "Supabase anonymous key"
    required:
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
  commandFunction: |-
    (config) => ({
      command: "node",
      args: ["dist-server/index.js"],
      env: {
        SUPABASE_URL: config.SUPABASE_URL,
        SUPABASE_ANON_KEY: config.SUPABASE_ANON_KEY
      }
    })
